<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Depth Viewer</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { ARButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js';

const params = new URLSearchParams(window.location.search);
const imageUrl = params.get("image");
const depthUrl = params.get("depth");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(ARButton.createButton(renderer));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(0, 5, 5);
scene.add(light);

const textureLoader = new THREE.TextureLoader();

const imageTexture = textureLoader.load(imageUrl);
const depthTexture = textureLoader.load(depthUrl);

const geometry = new THREE.PlaneGeometry(3, 3, 256, 256);

const material = new THREE.MeshStandardMaterial({
    map: imageTexture,
    displacementMap: depthTexture,
    displacementScale: 0.5
});

const plane = new THREE.Mesh(geometry, material);
scene.add(plane);

const controls = new OrbitControls(camera, renderer.domElement);

renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
});

</script>

</body>
</html>
